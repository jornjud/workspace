<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ คำนวณค่าไฟ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .card { 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h2 { font-size: 22px; margin-bottom: 5px; }
        .header p { font-size: 13px; opacity: 0.9; }

        .content { padding: 20px; }

        .section { margin-bottom: 18px; }
        .section-label {
            font-size: 12px;
            color: #667eea;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-row { display: flex; gap: 10px; }
        .input-group { flex: 1; }
        
        label { 
            display: block; 
            font-size: 13px; 
            font-weight: 600; 
            color: #333; 
            margin-bottom: 6px; 
        }
        input { 
            width: 100%; 
            padding: 14px 12px; 
            border: 2px solid #e8e8e8; 
            border-radius: 12px; 
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { 
            border-color: #667eea; 
            outline: none; 
        }
        input[readonly] { 
            background: #f5f5f5; 
            color: #888; 
        }

        .result-box {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-radius: 16px;
            padding: 18px;
            margin-top: 20px;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .result-header span { font-size: 12px; color: #888; }
        
        .person-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed rgba(0,0,0,0.1);
        }
        .person-row:last-child { border-bottom: none; }
        
        .person-info { display: flex; align-items: center; gap: 10px; }
        .person-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .person-name { font-weight: 600; color: #333; font-size: 15px; }
        .person-unit { font-size: 12px; color: #888; }
        
        .person-amount { text-align: right; }
        .person-real { font-size: 12px; color: #666; }
        .person-final { 
            font-size: 20px; 
            font-weight: 700; 
            color: #d32f2f; 
        }

        .rate-info {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .btn-share {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-share:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-share:active { transform: translateY(0); }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>⚡ ค่าไฟฟ้า</h2>
        <p>แยกยอดผู้เช่า</p>
    </div>

    <div class="content">
        <!-- ข้อมูลบิล -->
        <div class="section">
            <div class="section-label">📋 ข้อมูลบิล</div>
            <div class="input-row">
                <div class="input-group">
                    <label>ยอดเงิน (บาท)</label>
                    <input type="number" id="totalMoney" placeholder="0.00" step="0.01" inputmode="decimal">
                </div>
                <div class="input-group">
                    <label>หน่วยรวม</label>
                    <input type="number" id="totalUnit" placeholder="0" inputmode="numeric">
                </div>
            </div>
        </div>

        <!-- ผู้เช่า -->
        <div class="section">
            <div class="section-label">👩‍💼 ผู้เช่า</div>
            <div class="input-row">
                <div class="input-group">
                    <label>ห้อง 1 (หน่วย)</label>
                    <input type="number" id="unit1" placeholder="0" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label>ห้อง 2 (หน่วย)</label>
                    <input type="number" id="unit2" readonly>
                </div>
            </div>
        </div>

        <!-- ผลลัพธ์ -->
        <div class="result-box" id="resultBox">
            <div class="result-header">
                <span>💰 ยอดที่ต้องเก็บ</span>
                <span>🔄 ปัดขึ้น</span>
            </div>

            <div class="person-row">
                <div class="person-info">
                    <div class="person-avatar">👩</div>
                    <div>
                        <div class="person-name">ห้อง 1</div>
                        <div class="person-unit" id="unitText1">0 หน่วย</div>
                    </div>
                </div>
                <div class="person-amount">
                    <div class="person-real" id="real1">0.00 บาท</div>
                    <div class="person-final" id="final1">0 บาท</div>
                </div>
            </div>

            <div class="person-row">
                <div class="person-info">
                    <div class="person-avatar">👩</div>
                    <div>
                        <div class="person-name">ห้อง 2</div>
                        <div class="person-unit" id="unitText2">0 หน่วย</div>
                    </div>
                </div>
                <div class="person-amount">
                    <div class="person-real" id="real2">0.00 บาท</div>
                    <div class="person-final" id="final2">0 บาท</div>
                </div>
            </div>

            <div class="rate-info">
                📊า อัตรเฉลี่ย: <span id="avgRate">0.0000</span> บาท/หน่วย
            </div>
        </div>

        <!-- ปุ่มแชร์ -->
        <button class="btn-share" onclick="shareResult()" id="shareBtn" disabled>
            <span>📤</span> แชร์ผลลัพธ์
        </button>
    </div>
</div>

<div class="toast" id="toast">📋 คัดลอกไปย่อแล้ว!</div>

<script>
    const inputs = ['totalMoney', 'totalUnit', 'unit1'];
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', calculate);
    });

    function calculate() {
        const totalMoney = parseFloat(document.getElementById('totalMoney').value) || 0;
        const totalUnit = parseFloat(document.getElementById('totalUnit').value) || 0;
        const unit1 = parseFloat(document.getElementById('unit1').value) || 0;

        if (totalMoney > 0 && totalUnit > 0) {
            // คำนวณหน่วยห้อง 2 อัตโนมัติ
            const unit2 = Math.max(0, totalUnit - unit1);
            document.getElementById('unit2').value = unit2;

            // อัตราเฉลี่ย
            const avg = totalMoney / totalUnit;
            document.getElementById('avgRate').textContent = avg.toFixed(4);

            // คำนวณยอด
            const pay1 = unit1 * avg;
            const pay2 = unit2 * avg;

            // แสดงผล
            document.getElementById('unitText1').textContent = unit1 + ' หน่วย';
            document.getElementById('unitText2').textContent = unit2 + ' หน่วย';
            
            document.getElementById('real1').textContent = pay1.toFixed(2) + ' บาท';
            document.getElementById('real2').textContent = pay2.toFixed(2) + ' บาท';
            
            document.getElementById('final1').textContent = Math.ceil(pay1) + ' บาท';
            document.getElementById('final2').textContent = Math.ceil(pay2) + ' บาท';

            document.getElementById('shareBtn').disabled = false;
        } else {
            document.getElementById('shareBtn').disabled = true;
        }
    }

    async function shareResult() {
        const totalMoney = document.getElementById('totalMoney').value;
        const totalUnit = document.getElementById('totalUnit').value;
        const unit1 = document.getElementById('unit1').value;
        const final1 = document.getElementById('final1').textContent;
        const final2 = document.getElementById('final2').textContent;
        const avgRate = document.getElementById('avgRate').textContent;

        const text = `⚡ ค่าไฟฟ้าประจำเดือน
────────────────
💰 ยอดบิล: ${totalMoney} บาท
📊 หน่วยรวม: ${totalUnit} หน่วย
📈 อัตราเฉลี่ย: ${avgRate} บาท/หน่วย
────────────────
🏠 ห้อง 1: ${unit1} หน่วย → ${final1}
🏠 ห้อง 2: ${totalUnit - unit1} หน่วย → ${final2}
────────────────
#ค่าไฟ`;

        // ลองใช้ Web Share API ก่อน
        if (navigator.share) {
            try {
                await navigator.share({
                    title: '⚡ ค่าไฟฟ้า',
                    text: text
                });
                return;
            } catch (e) {
                // ถ้า user ยกเลิก ก็ไม่ทำอะไร
            }
        }

        // Fallback: คัดลอกไป clipboard
        try {
            await navigator.clipboard.writeText(text);
            showToast('📋 คัดลอกไปย่อแล้ว!');
        } catch (e) {
            showToast('❌ ไม่สามารถคัดลอกได้');
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }
</script>

</body>
</html>
