<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องคิดเงิน JsuShop</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-main">

<div id="global-progress-container" class="hidden">
    <div id="global-progress-bar"></div>
</div>

<div id="app" class="app-container">
    <main id="loading-view" class="card text-center">
        <div class="loader"></div>
        <p class="mt-4 text-light">กำลังโหลด...</p>
    </main>

    <main id="cashier-view" class="card card--wide hidden">
        <header class="cashier-header">
            <div>
                <h1>เครื่องคิดเงิน JsuShop</h1>
                <p>QrMember - มืออาชีพและรวดเร็ว</p> </div>
            <a href="staff.html" class="btn btn--tertiary btn--auto btn--sm">🔙 กลับหน้าหลัก</a>
        </header>

        <div class="cashier-grid-container">
            <section class="cashier-left-panel">
                <div id="cashier-tabs-container" class="cashier-tabs-container"></div>
                <div class="search-wrapper">
                    <input type="search" id="customer-identifier" placeholder="ค้นหาลูกค้า (ชื่อ / เบอร์โทร)" class="input-field mb-2" autocomplete="off">
                    <button id="scan-qr-btn" class="btn btn--secondary btn--sm mt-1">📷 Scan QR</button>
                    <div id="live-search-results"></div>
                </div>
                <section id="selected-customer-box" class="customer-detail-box">
                    <p><strong>ลูกค้า:</strong> <span id="customer-name">ลูกค้าทั่วไป</span></p>
                    <p class="text-sm text-medium">แต้มปัจจุบัน: <span id="customer-points">...</span></p>
                    <button id="clear-customer-btn" class="btn btn--danger btn--auto btn--sm mt-2 hidden">เปลี่ยนลูกค้า</button>
                </section>
            </section>

            <section class="cashier-calculator-panel">
                
                <div class="calculator-display-wrapper">
                    <div id="amount-due-display" class="amount-due-box">
                        <p class="label">ยอดรวมที่ต้องชำระ</p>
                        <span id="amount-due" class="value">0.00</span> บาท
                    </div>
                </div>

                <section class="manual-entry-container">
                    
                    <div class="manual-input-group">
                        <label for="mini-calc-history" class="input-label">1. ระบุยอดรวม (บาท)</label>
                        
                        <div id="mini-calc-history" class="mini-calc-history-display" placeholder="0.00"></div>
                        </div>
                    
                    <div id="mini-calc-pad" class="mini-calc-grid">
                        <button class="btn btn--tertiary calc-key op" data-key="C">C</button>
                        <button class="btn btn--tertiary calc-key op" data-key="backspace">⌫</button>
                        <button class="btn btn--tertiary calc-key op" data-key="/">÷</button>
                        <button class="btn btn--tertiary calc-key op" data-key="*">×</button>
                        
                        <button class="btn btn--tertiary calc-key" data-key="7">7</button>
                        <button class="btn btn--tertiary calc-key" data-key="8">8</button>
                        <button class="btn btn--tertiary calc-key" data-key="9">9</button>
                        <button class="btn btn--tertiary calc-key op" data-key="-">−</button>
                        
                        <button class="btn btn--tertiary calc-key" data-key="4">4</button>
                        <button class="btn btn--tertiary calc-key" data-key="5">5</button>
                        <button class="btn btn--tertiary calc-key" data-key="6">6</button>
                        <button class="btn btn--tertiary calc-key op" data-key="+">+</button>
        
                        <button class="btn btn--tertiary calc-key" data-key="1">1</button>
                        <button class="btn btn--tertiary calc-key" data-key="2">2</button>
                        <button class="btn btn--tertiary calc-key" data-key="3">3</button>
                        <button class="btn btn--tertiary calc-key op equals" data-key="=">=</button> <button class="btn btn--tertiary calc-key zero" data-key="0">0</button> <button class="btn btn--tertiary calc-key" data-key=".">.</button>
                        </div>
                    <div class="manual-input-group" style="margin-top: 1.5rem;">
                        <label for="cash-tendered-input" class="input-label">2. รับเงินมา (บาท)</label>
                        <input type="number" id="cash-tendered-input" placeholder="0" class="input-field font-bold" min="0" value="" inputmode="decimal" style="text-align: right;" autocomplete="off">
                    </div>

                    <div class="quick-cash-grid" style="grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-top: 1rem;">
                        <button class="btn btn--tertiary quick-cash-btn" data-amount="exact">พอดี</button>
                        <button class="btn btn--tertiary quick-cash-btn" data-amount="1">1</button>
                        <button class="btn btn--tertiary quick-cash-btn" data-amount="5">5</button>
                        <button class="btn btn--tertiary quick-cash-btn" data-amount="10">10</button>
                        <button class="btn btn--tertiary quick-cash-btn" data-amount="20">20</button>
                        <button class="btn btn--tertiary quick-cash-btn" data-amount="50">50</button>
                        <button class="btn btn--tertiary quick-cash-btn" data-amount="100">100</button>
                        <button class="btn btn--tertiary quick-cash-btn" data-amount="500">500</button>
                        <button class="btn btn--tertiary quick-cash-btn" data-amount="1000">1000</button>
                    </div>
                    <div class="flex justify-between items-center mt-4">
                        <label class="input-label text-2xl" style="margin-bottom: 0;">เงินทอน:</label>
                        <span id="change-due" class="payment-section__change text-success-color">0.00</span>
                    </div>

                </section>
            
            </section>

            <section class="cashier-payment-panel">
                <footer class="action-buttons-container">
                    <button id="cancel-btn" class="btn btn--tertiary text-base hidden">ยกเลิก/คิดต่อ</button>
                    <button id="add-points-btn" class="btn btn--success text-xl">
                        <span class="btn-text">✅ ยืนยันและบันทึกแต้ม</span>
                    </button>
                </footer>
                
                <p id="cashier-error" class="error-message"></p>
            </section>

        </div> </main>

</div>


<div id="app-modal" class="modal-backdrop hidden">
    <div class="modal-content">
        <div id="modal-icon" class="text-5xl mb-4"></div>
        <h3 id="modal-title" class="text-2xl font-bold mb-2">สำเร็จ!</h3>
        <p id="modal-message" class="text-slate-600 mb-6"></p>
        <button id="modal-close-btn" class="btn btn--primary">ตกลง</button>
    </div>
</div>

<span id="app-version" class="version-display"></span>
<script src="cashier.js" type="module" defer></script>
<script src="version.js" defer></script>
</body>
</html>
