<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Printer 🔴⚪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f1f5f9;
        }

        /* พิมพ์ A4 */
        @media print {
            @page {
                size: A4;
                margin: 0;
            }

            html, body {
                width: 210mm;
                height: 297mm;
                margin: 0;
                padding: 0;
                background: white;
            }

            .no-print {
                display: none !important;
            }

            #print-area {
                width: 210mm !important;
                height: 297mm !important;
                margin: 0 !important;
                padding: 5mm !important;
                box-shadow: none !important;
                display: grid !important;
            }

            .qr-box {
                padding: 3mm !important;
            }

            .qr-box img {
                width: 100% !important;
                height: 100% !important;
                object-fit: contain !important;
            }
        }

        #print-area {
            width: 210mm;
            height: 297mm;
            background: white;
            margin: 0 auto;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 5mm;
            display: grid;
            gap: 2mm;
        }

        .qr-box {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 4mm;
            padding: 5mm;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .qr-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .qr-box img.compressed {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        .empty-state {
            text-align: center;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 40px;
            height: 40px;
            margin: 0 auto 8px;
        }

        .empty-state p {
            font-size: 12px;
        }

        /* Progress bar */
        .progress-container {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #dc2626, #f87171);
            width: 0%;
            transition: width 0.2s ease;
            border-radius: 3px;
        }

        .progress-text {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #6b7280;
            background: rgba(255,255,255,0.9);
            padding: 2px 8px;
            border-radius: 10px;
            display: none;
        }

        .progress-text.active {
            display: block;
        }

        /* Step indicators */
        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 8px;
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
        }

        .step.active {
            background: #fef2f2;
            border-color: #dc2626;
        }

        .step.completed {
            background: #dcfce7;
            border-color: #22c55e;
        }

        .step-number {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #d1d5db;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .step.active .step-number {
            background: #dc2626;
            animation: pulse 2s infinite;
        }

        .step.completed .step-number {
            background: #22c55e;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .step-label {
            font-size: 13px;
            font-weight: 500;
            color: #374151;
        }

        /* Print button */
        .print-ready {
            background: linear-gradient(135deg, #22c55e, #16a34a) !important;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.5); }
            50% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.8); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- แผงควบคุม -->
    <div class="no-print w-full max-w-2xl bg-white rounded-2xl shadow-xl p-6 mb-6 border-t-8 border-red-600">
        
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">QR Printer 🔴⚪</h1>
            <p class="text-sm text-gray-500 mt-1">พิมพ์รูปภาพ A4 ง่ายๆ ใน 3 ขั้นตอน</p>
        </div>

        <!-- Steps -->
        <div class="flex flex-col md:flex-row gap-3 mb-6">
            
            <!-- Step 1: เลือกจำนวน -->
            <div class="step active flex-1" id="step1">
                <div class="step-number">1</div>
                <div class="flex-1">
                    <div class="step-label">เลือกจำนวนรูป</div>
                    <select id="image-count" class="w-full mt-1 border-2 border-gray-200 rounded-lg px-2 py-1 text-sm focus:ring-2 focus:ring-red-500 focus:border-red-500">
                        <option value="1">1 รูป (เต็มหน้า)</option>
                        <option value="2">2 รูป</option>
                        <option value="4">4 รูป</option>
                        <option value="6">6 รูป</option>
                        <option value="8">8 รูป</option>
                        <option value="10">10 รูป</option>
                        <option value="12">12 รูป</option>
                    </select>
                    <select id="orientation" class="w-full mt-1 border-2 border-gray-200 rounded-lg px-2 py-1 text-sm focus:ring-2 focus:ring-red-500 focus:border-red-500">
                        <option value="portrait">📐 แนวตั้ง</option>
                        <option value="landscape">📐 แนวนอน</option>
                    </select>
                    <div id="orientation-hint" class="text-xs text-gray-400 mt-1">(สำหรับ 1 รูป)</div>
                </div>
            </div>

            <!-- Step 2: อัปโหลดรูป -->
            <div class="step flex-1" id="step2">
                <div class="step-number">2</div>
                <div class="flex-1">
                    <div class="step-label">อัปโหลดรูปภาพ</div>
                    <label for="file-upload" class="cursor-pointer block mt-1 bg-red-100 hover:bg-red-200 text-red-700 font-bold py-2 px-4 rounded-lg text-center transition-all">
                        📂 อัปโหลด 1 รูป
                    </label>
                    <input id="file-upload" type="file" class="hidden" accept="image/*" multiple>
                    <div id="upload-status" class="text-xs text-gray-500 mt-1">อัปโหลด 1 รูป → จะ copy ไปทุกช่อง</div>
                </div>
            </div>

            <!-- Step 3: พิมพ์ -->
            <div class="step flex-1" id="step3">
                <div class="step-number">3</div>
                <div class="flex-1">
                    <div class="step-label">พิมพ์</div>
                    <button onclick="handlePrint()" id="print-btn" class="w-full mt-1 bg-gray-400 text-white font-bold py-2 px-4 rounded-lg flex items-center justify-center gap-2 cursor-not-allowed" disabled>
                        🖨️ รออัปโหลดรูป...
                    </button>
                </div>
            </div>
        </div>

        <!-- วิธีพิมพ์ -->
        <div id="upload-hint" class="text-xs text-gray-600 bg-gray-100 p-3 rounded-xl text-center">
            <b>📋 วิธีพิมพ์:</b> Ctrl+P → Save as PDF → A4 → Margins: None
        </div>

        <div class="mt-3 text-center text-xs text-gray-400">
            เวอร์ชัน 0.4.2
        </div>
    </div>

    <!-- พื้นที่พิมพ์ -->
    <div id="print-area">
    </div>

    <script>
        const fileInput = document.getElementById('file-upload');
        const printBtn = document.getElementById('print-btn');
        const imageCountSelect = document.getElementById('image-count');
        const orientationSelect = document.getElementById('orientation');
        const orientationHint = document.getElementById('orientation-hint');
        const uploadHint = document.getElementById('upload-hint');
        const uploadStatus = document.getElementById('upload-status');
        const printArea = document.getElementById('print-area');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');

        let currentCount = 1;
        let isProcessing = false;

        // อัปเดตสถานะ step
        function updateSteps(stepNum, status = 'active') {
            step1.classList.remove('active', 'completed');
            step2.classList.remove('active', 'completed');
            step3.classList.remove('active', 'completed');

            if (stepNum >= 1) step1.classList.add('completed');
            if (stepNum >= 2) step2.classList.add(status === 'processing' ? 'active' : 'completed');
            if (stepNum >= 3) step3.classList.add(status === 'ready' ? 'completed' : 'active');
        }

        // สร้าง qr-box ตามจำนวน
        function createQrBoxes(count) {
            printArea.innerHTML = '';
            
            let cols, rows;
            if (count === 1) {
                cols = 1;
                rows = 1;
            } else {
                cols = Math.ceil(count / 2);
                rows = 2;
                if (count === 6 || count === 12) {
                    cols = count / 2;
                }
            }
            
            printArea.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            printArea.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

            for (let i = 0; i < count; i++) {
                const box = document.createElement('div');
                box.className = 'qr-box';
                box.id = `box-${i}`;
                
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.id = `empty-${i}`;
                empty.innerHTML = `
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <p>รูปที่ ${i + 1}</p>
                `;
                
                const img = document.createElement('img');
                img.id = `qr-${i}`;
                img.style.display = 'none';
                
                // Progress bar
                const progressContainer = document.createElement('div');
                progressContainer.className = 'progress-container';
                progressContainer.id = `progress-${i}`;
                
                const progressBar = document.createElement('div');
                progressBar.className = 'progress-bar';
                progressBar.id = `progress-bar-${i}`;
                
                const progressText = document.createElement('div');
                progressText.className = 'progress-text';
                progressText.id = `progress-text-${i}`;
                progressText.textContent = 'กำลังประมวลผล...';
                
                progressContainer.appendChild(progressBar);
                box.appendChild(empty);
                box.appendChild(img);
                box.appendChild(progressContainer);
                box.appendChild(progressText);
                printArea.appendChild(box);
            }
        }

        // แสดง progress
        function showProgress(index, percent, text) {
            const container = document.getElementById(`progress-${index}`);
            const bar = document.getElementById(`progress-bar-${index}`);
            const textEl = document.getElementById(`progress-text-${index}`);
            
            if (container && bar && textEl) {
                container.classList.add('active');
                bar.style.width = percent + '%';
                textEl.classList.add('active');
                textEl.textContent = text || `กำลังประมวลผล... ${percent}%`;
            }
        }

        // ซ่อน progress
        function hideProgress(index) {
            const container = document.getElementById(`progress-${index}`);
            const textEl = document.getElementById(`progress-text-${index}`);
            
            if (container) container.classList.remove('active');
            if (textEl) textEl.classList.remove('active');
        }

        // แสดงรูปตัวอย่างดิบ (ทันที) - แก้ไขให้รองรับหลายรูป
        function showPreview(file, index) {
            return new Promise((resolve) => {
                const box = document.getElementById(`box-${index}`);
                if (!box) {
                    resolve(null);
                    return;
                }
                
                const img = document.getElementById(`qr-${index}`);
                const empty = document.getElementById(`empty-${index}`);
                
                if (!img || !empty) {
                    resolve(null);
                    return;
                }
                
                // ใช้ URL.createObjectURL ซึ่งเร็วกว่า FileReader
                const objectUrl = URL.createObjectURL(file);
                
                img.onload = function() {
                    img.style.display = 'block';
                    empty.style.display = 'none';
                    showProgress(index, 30, 'แสดงตัวอย่างแล้ว...');
                    
                    // ✅ อัปเดตปุ่มพิมพ์ทันทีเมื่อรูปแสดงได้ (ไม่ต้องรอ compress)
                    updatePrintButton();
                    
                    resolve(objectUrl);
                };
                
                img.onerror = function() {
                    console.error('Failed to load image:', index);
                    resolve(null);
                };
                
                img.src = objectUrl;
            });
        }

        // บีบอัดรูป (ใน background)
        function compressImage(file, index, maxWidth = 1500, quality = 0.8) {
            return new Promise((resolve) => {
                showProgress(index, 50, 'กำลังบีบอัด...');
                
                const objectUrl = URL.createObjectURL(file);
                const img = new Image();
                
                img.onload = function() {
                    showProgress(index, 70, 'กำลังประมวลผล...');
                    
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth || height > maxWidth) {
                        if (width > height) {
                            height = Math.round(height * maxWidth / width);
                            width = maxWidth;
                        } else {
                            width = Math.round(width * maxWidth / height);
                            height = maxWidth;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    showProgress(index, 90, 'เกืบบูล...');
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', quality);
                    
                    // อัปเดตรูปที่บีบอัดแล้ว
                    const imgEl = document.getElementById(`qr-${index}`);
                    if (imgEl) {
                        imgEl.src = dataUrl;
                        imgEl.classList.add('compressed');
                    }
                    
                    // cleanup
                    URL.revokeObjectURL(objectUrl);
                    hideProgress(index);
                    resolve(dataUrl);
                };
                
                img.onerror = function() {
                    console.error('Failed to compress image:', index);
                    resolve(null);
                };
                
                img.src = objectUrl;
            });
        }

        // เมื่อเปลี่ยนจำนวนรูป
        imageCountSelect.addEventListener('change', function() {
            currentCount = parseInt(this.value);
            
            // อัปเดตข้อความบอกจำนวน
            const countText = currentCount === 1 ? '1 รูป' : `${currentCount} รูป`;
            uploadStatus.textContent = `อัปโหลด 1 รูป → จะ copy ไป ${countText}`;
            
            // แสดง/ซ่อน orientation สำหรับ 1 รูป
            if (currentCount === 1) {
                orientationSelect.parentElement.style.display = 'block';
                orientationHint.style.display = 'block';
            } else {
                orientationSelect.parentElement.style.display = 'none';
                orientationHint.style.display = 'none';
            }
            
            createQrBoxes(currentCount);
            updateHint();
            updateSteps(1);
            updatePrintButton();
            
            fileInput.value = '';
            uploadStatus.textContent = 'ยังไม่ได้เลือกรูป';
        });

        // เมื่อเปลี่ยนแนว
        orientationSelect.addEventListener('change', updateHint);

        function updateHint() {
            const count = currentCount;
            const orient = orientationSelect.value;
            
            if (count === 1) {
                const orientText = orient === 'portrait' ? 'แนวตั้ง' : 'แนวนอน';
                uploadHint.innerHTML = `<b>📋 วิธีพิมพ์:</b> Ctrl+P → Save as PDF → A4 → Margins: None<br><b>📐 Layout:</b> 1 รูป เต็มหน้า (${orientText})`;
            } else {
                const perRow = Math.ceil(count / 2);
                uploadHint.innerHTML = `<b>📋 วิธีพิมพ์:</b> Ctrl+P → Save as PDF → A4 → Margins: None<br><b>📐 Layout:</b> ${count} รูป (${perRow}x2) เรียงแนวนอน ขนาดเท่ากัน พอดี A4`;
            }
        }

        // อัปโหลดรูป
        fileInput.addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            
            if (files.length > 0) {
                isProcessing = true;
                updateSteps(2, 'processing');
                
                const singleFile = files[0]; // ใช้รูปแรกอัปโหลดไปทุกช่อง
                
                // แสดงตัวอย่างดิบก่อน (ทันที) - copy ไปทุกช่อง
                for (let i = 0; i < currentCount; i++) {
                    showPreview(singleFile, i);
                }
                
                // บีบอัดใน background - copy ไปทุกช่อง
                for (let i = 0; i < currentCount; i++) {
                    compressImage(singleFile, i);
                }
                
                const fileText = currentCount === 1 ? '1 รูป' : `${currentCount} รูป`;
                uploadStatus.textContent = `✅ โหลด ${fileText} เสร็จแล้ว!`;
                
                isProcessing = false;
                updateSteps(2, 'completed');
                updatePrintButton();
            }
        });

        function updatePrintButton() {
            let hasImages = false;
            
            if (currentCount === 1) {
                const img = document.getElementById('qr-0');
                hasImages = img && img.src && img.style.display !== 'none';
            } else {
                let count = 0;
                for (let i = 0; i < currentCount; i++) {
                    const img = document.getElementById(`qr-${i}`);
                    if (img && img.src && img.style.display !== 'none') {
                        count++;
                    }
                }
                hasImages = count === currentCount;
            }
            
            if (hasImages) {
                printBtn.classList.remove('bg-gray-400', 'cursor-not-allowed');
                printBtn.classList.add('print-ready');
                printBtn.disabled = false;
                printBtn.innerHTML = '🖨️ พิมพ์เลย!';
                // ✅ แสดง step 3 เป็น completed เมื่อพร้อมพิมพ์
                step1.classList.remove('active');
                step1.classList.add('completed');
                step2.classList.remove('active');
                step2.classList.add('completed');
                step3.classList.remove('active');
                step3.classList.add('completed');
            } else {
                printBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
                printBtn.classList.remove('print-ready');
                printBtn.disabled = true;
                printBtn.innerHTML = '🖨️ รออัปโหลดรูป...';
            }
        }

        function handlePrint() {
            window.print();
        }

        // เริ่มต้น
        createQrBoxes(1);
        orientationSelect.parentElement.style.display = 'block';
        orientationHint.style.display = 'block';
        updateHint();
        updateSteps(1);
    </script>
</body>
</html>
